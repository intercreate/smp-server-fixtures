name: Build

on:
  push:
    branches: [main]
    tags: ['*']
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.leg }} fixtures
    strategy:
      fail-fast: false
      matrix:
        include:
          # Host toolchain. native_sim is 32-bit (the 64-bit PTY UART RX is
          # broken on v4.4.0), so it needs gcc-multilib.
          - leg: native_sim
            toolchains: ""
            platforms: native_sim
          # Zephyr SDK ARM toolchain: the runnable QEMU DFU fixture and the
          # build-only hardware images.
          - leg: arm
            toolchains: arm-zephyr-eabi
            platforms: qemu_cortex_m0 nrf52840dk/nrf52840
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          path: working_directory
          persist-credentials: false

      - name: Install 32-bit host toolchain for native_sim
        if: matrix.leg == 'native_sim'
        run: sudo apt-get update && sudo apt-get install -y gcc-multilib g++-multilib

      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - uses: zephyrproject-rtos/action-zephyr-setup@v1
        with:
          app-path: working_directory
          toolchains: ${{ matrix.toolchains }}
          ccache-cache-key: ${{ matrix.leg }}

      - name: Build fixtures (Twister, all configs for this leg)
        working-directory: working_directory
        run: |
          args=""
          for p in ${{ matrix.platforms }}; do args="$args -p $p"; done
          west twister -T apps --build-only --inline-logs -O twister-out $args

      - name: Collect fixtures with canonical names
        working-directory: working_directory
        run: |
          # zephyr_<zephyr-version>_smp_server_<8-char-fixtures-SHA>_<target>_<config>.<ext>
          ver=$(west list zephyr --format='{revision}'); ver=${ver#v}
          sha=${GITHUB_SHA::8}
          mkdir -p fixtures
          while IFS= read -r d; do
            rest=$(basename "$d" | sed 's/^smp_server\.fixture\.//')  # <config>.<target>
            config=${rest%.*}
            target=${rest#*.}
            base="fixtures/zephyr_${ver}_smp_server_${sha}_${target}_${config}"
            # native_sim: runnable executable. sysbuild (QEMU/hardware): the
            # MCUboot + signed-app merged image, named .merged.hex to be explicit.
            [ -f "$d/zephyr/zephyr.exe" ] && cp "$d/zephyr/zephyr.exe" "${base}.exe"
            hex=$(ls "$d"/merged_*.hex 2>/dev/null | head -1)
            [ -n "$hex" ] && cp "$hex" "${base}.merged.hex"
            # hardware DFU: signed application image for upload via the img group
            signed="$d/smp-server/zephyr/zephyr.signed.bin"
            [ -f "$signed" ] && cp "$signed" "${base}.signed.bin"
          done < <(find twister-out -type d -name 'smp_server.fixture.*')
          ls -l fixtures

      - uses: actions/upload-artifact@v7
        with:
          name: fixtures-${{ matrix.leg }}
          path: working_directory/fixtures/*
          if-no-files-found: error

      - name: Upload Twister logs on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: twister-logs-${{ matrix.leg }}
          path: working_directory/twister-out/**/build.log

  release:
    name: Publish rolling 'latest' release
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Checksums
        working-directory: artifacts
        run: sha256sum * > SHA256SUMS

      - run: gh release delete latest --cleanup-tag -y || true
        env:
          GH_TOKEN: ${{ github.token }}

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest SMP Server Fixtures
          body: Built from ${{ github.sha }}.
          make_latest: true
          target_commitish: ${{ github.sha }}
          files: artifacts/*
