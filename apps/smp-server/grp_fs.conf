# File System Management Group
# Enables MCUmgr handlers for file system operations (upload, download, list, etc.)
#
# NOTE: This is a TEST FIXTURE - security hooks are intentionally disabled for ease of testing.
# Production deployments should enable CONFIG_MCUMGR_GRP_FS_FILE_ACCESS_HOOK=y and implement
# proper access control callbacks. See:
# https://docs.zephyrproject.org/latest/services/device_mgmt/mcumgr_callbacks.html

# littlefs's FMP backend mounts on a flash_map partition (the sample mounts
# storage_partition at /lfs1). native_sim backs this with its flash simulator.
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Enable file system support
CONFIG_FILE_SYSTEM=y
CONFIG_FILE_SYSTEM_LITTLEFS=y

# Enable FS management group
CONFIG_MCUMGR_GRP_FS=y

# Enable file status command (file info/stat)
CONFIG_MCUMGR_GRP_FS_FILE_STATUS=y

# Enable checksum/hash support for file verification
CONFIG_MCUMGR_GRP_FS_CHECKSUM_HASH=y
CONFIG_MCUMGR_GRP_FS_CHECKSUM_IEEE_CRC32=y

# Self-selects PSA_CRYPTO + PSA_WANT_ALG_SHA_256 on v4.4.0 (needs tf-psa-crypto
# in west.yml). The old CONFIG_MBEDTLS_SHA256 symbol is gone -- do not set it.
CONFIG_MCUMGR_GRP_FS_HASH_SHA256=y

# Enable supported types command
CONFIG_MCUMGR_GRP_FS_CHECKSUM_HASH_SUPPORTED_CMD=y
