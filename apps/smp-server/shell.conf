# SMP over the Zephyr shell: SMP frames share the UART with the shell prompt,
# command echo, and (via the shell log backend) log output -- the strongest
# stress test of smpclient's SMP/serial demux. Used instead of serial.conf.
# On connect the shell emits a banner/prompt, so clients must tolerate leading
# non-SMP bytes.
CONFIG_BASE64=y
CONFIG_CRC=y
CONFIG_CONSOLE=y
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y
CONFIG_MCUMGR_TRANSPORT_SHELL=y

# The shell's SMP-frame interception runs in the interrupt-driven RX path; the
# native_sim PTY defaults to polling, which does not capture frames (the 0x09
# frame marker is read as a TAB). Force interrupt-driven RX.
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_SHELL_BACKEND_SERIAL_API_INTERRUPT_DRIVEN=y

# The shell carries SMP; no dedicated UART transport.
CONFIG_UART_MCUMGR=n
CONFIG_MCUMGR_TRANSPORT_UART=n

# Route logs through the shell so they interleave with SMP on the same UART.
CONFIG_LOG=y
CONFIG_SHELL_LOG_BACKEND=y
