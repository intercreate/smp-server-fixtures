# Raw UART transport (no base64/CRC line framing); for smpclient netbuf-param
# serial work (intercreate/smpclient#81). Logging shares the UART, so disable it.
CONFIG_CONSOLE=y
CONFIG_CRC=n
CONFIG_UART_MCUMGR=y
CONFIG_UART_MCUMGR_RAW_PROTOCOL=y
CONFIG_MCUMGR_TRANSPORT_RAW_UART=y
CONFIG_MCUMGR_TRANSPORT_RAW_UART_INPUT_TIMEOUT=y
CONFIG_UART_CONSOLE=n
CONFIG_LOG=n
