# Accept long SMP serial frame lines (up to 512 bytes per line) so smpclient can
# be driven with SMPSerialTransport(BufferParams(line_length=N)) for N != the
# client default of 128. UART_MCUMGR_RX_BUF_SIZE bounds the line the server
# accepts; the netbuf must hold the reassembled message.
CONFIG_UART_MCUMGR_RX_BUF_SIZE=512
CONFIG_UART_MCUMGR_RX_BUF_COUNT=16
CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE=2048
