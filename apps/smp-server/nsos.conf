# Native offloaded sockets: the UDP server binds a real host socket (reachable
# at 127.0.0.1:<port>) with no TAP/root, unlike the zeth TAP path.
CONFIG_ETH_NATIVE_TAP=n
CONFIG_NET_DRIVERS=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_OFFLOAD=y
CONFIG_NET_NATIVE_OFFLOADED_SOCKETS=y
CONFIG_NET_IPV6_DAD=n
# Offloaded net_sockaddr exceeds the default 8-byte transport user-data size.
CONFIG_MCUMGR_TRANSPORT_NETBUF_USER_DATA_SIZE=128
