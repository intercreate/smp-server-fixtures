# mps2/an385 board tweaks for the SMP fixtures.

# The flash simulator backs the MCUboot partitions and the littlefs storage
# partition defined in mps2_an385.overlay (not enabled in the board defconfig).
CONFIG_FLASH_SIMULATOR=y

# Keep the interactive shell off uart0 (dummy backend) so the shell command
# group can be exercised over SMP without the shell stealing the SMP UART.
# The shell *transport* fixture re-enables the serial backend in shell.conf.
CONFIG_SHELL_BACKEND_SERIAL=n
CONFIG_SHELL_BACKEND_DUMMY=y
