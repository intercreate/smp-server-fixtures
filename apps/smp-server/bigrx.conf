# Generous UART MCUmgr RX buffer pool. The native_sim PTY has no baud pacing,
# so back-to-back fragments overrun the default 2x128 RX pool and get dropped
# ("uart_mcumgr: Insufficient buffers, fragment dropped"). A larger pool lets
# native_sim receive full-size multi-fragment SMP messages (smpclient #73/#81).
CONFIG_UART_MCUMGR_RX_BUF_COUNT=32
CONFIG_UART_MCUMGR_RX_BUF_SIZE=512
