# Disable the MCUmgr parameters command so MCUMgrParametersRead is unsupported.
# Exercises smpclient's graceful fallback to BufferParams defaults when the
# server can't report buf_size/buf_count. Must be applied AFTER grp_os.conf
# (which enables it) -- EXTRA_CONF_FILE is last-wins.
CONFIG_MCUMGR_GRP_OS_MCUMGR_PARAMS=n
