sample:
  name: SMP Server Fixtures
  description: >-
    SMP (MCUmgr) server fixtures for exercising smpclient / smpmgr transports
    without hardware. native_sim and QEMU fixtures are runnable in CI; hardware
    fixtures are build-only images for a bench. Single source of truth: built
    locally with `west twister -T apps` and fanned out across CI legs.
common:
  build_only: true
  tags: smp_server fixture
tests:
  # native_sim: 32-bit on purpose -- the 64-bit native_sim PTY UART does not
  # deliver RX to the MCUmgr transport on v4.4.0 (boots but never answers SMP).
  # No MCUboot, so no img group. littlefs (fs group) is omitted: littlefs_fs.c
  # hits a -Werror on native_sim in v4.4.0; the fs group is exercised on hardware.
  smp_server.fixture.serial.native_sim:
    sysbuild: false
    platform_allow: [native_sim]
    integration_platforms: [native_sim]
    extra_args:
      - >-
        EXTRA_CONF_FILE="serial.conf;
        grp_os.conf;
        grp_shell.conf;
        grp_stat.conf;
        grp_settings.conf;
        grp_enum.conf;
        grp_zbasic.conf"

  smp_server.fixture.serial_raw.native_sim:
    sysbuild: false
    platform_allow: [native_sim]
    integration_platforms: [native_sim]
    extra_args:
      - >-
        EXTRA_CONF_FILE="raw_serial.conf;
        grp_os.conf;
        grp_shell.conf;
        grp_stat.conf;
        grp_settings.conf;
        grp_enum.conf;
        grp_zbasic.conf"

  smp_server.fixture.udp.native_sim:
    sysbuild: false
    platform_allow: [native_sim]
    integration_platforms: [native_sim]
    extra_args:
      - >-
        EXTRA_CONF_FILE="udp.conf;
        nsos.conf;
        grp_os.conf;
        grp_shell.conf;
        grp_stat.conf;
        grp_settings.conf;
        grp_enum.conf;
        grp_zbasic.conf"

  # QEMU: merged MCUboot + signed app, runnable in CI -- exercises serial + the
  # img (DFU) group. Serial is a host PTY when launched with QEMU_PTY=1. nRF51
  # has 16 KB RAM, so the RAM-heavy groups are omitted here.
  smp_server.fixture.serial.qemu_cortex_m0:
    sysbuild: true
    platform_allow: [qemu_cortex_m0]
    integration_platforms: [qemu_cortex_m0]
    extra_args:
      - >-
        EXTRA_CONF_FILE="serial.conf;
        grp_os.conf;
        grp_stat.conf;
        grp_enum.conf;
        grp_img.conf"
      - SB_CONFIG_BOOTLOADER_MCUBOOT=y
      - SB_CONFIG_BOOT_SIGNATURE_TYPE_NONE=y
      - SB_CONFIG_MERGED_HEX_FILES=y

  # Hardware: build-only signed images for a bench. Every group enabled.
  smp_server.fixture.serial.nrf52840dk:
    sysbuild: true
    platform_allow: [nrf52840dk/nrf52840]
    integration_platforms: [nrf52840dk/nrf52840]
    extra_args:
      - >-
        EXTRA_CONF_FILE="serial.conf;
        grp_os.conf;
        grp_fs.conf;
        grp_shell.conf;
        grp_stat.conf;
        grp_settings.conf;
        grp_enum.conf;
        grp_zbasic.conf;
        grp_img.conf"
      - SB_CONFIG_BOOTLOADER_MCUBOOT=y
      - SB_CONFIG_MERGED_HEX_FILES=y

  smp_server.fixture.ble.nrf52840dk:
    sysbuild: true
    tags: smp_server fixture bluetooth
    platform_allow: [nrf52840dk/nrf52840]
    integration_platforms: [nrf52840dk/nrf52840]
    extra_args:
      - >-
        EXTRA_CONF_FILE="bt.conf;
        grp_os.conf;
        grp_fs.conf;
        grp_shell.conf;
        grp_stat.conf;
        grp_settings.conf;
        grp_enum.conf;
        grp_zbasic.conf;
        grp_img.conf"
      - SB_CONFIG_BOOTLOADER_MCUBOOT=y
      - SB_CONFIG_MERGED_HEX_FILES=y
