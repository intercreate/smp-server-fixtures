# Image (DFU) group -- the app side of MCUboot DFU. Pair with sysbuild MCUboot
# (SB_CONFIG_BOOTLOADER_MCUBOOT=y). Not usable on native_sim (no MCUboot).
CONFIG_FLASH=y
CONFIG_STREAM_FLASH=y
CONFIG_FLASH_MAP=y
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_MCUMGR_GRP_IMG=y
CONFIG_MCUMGR_GRP_IMG_VERBOSE_ERR=y
CONFIG_MCUMGR_GRP_IMG_SLOT_INFO=y
