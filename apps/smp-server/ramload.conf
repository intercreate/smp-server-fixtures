# App side of MCUboot RAM_LOAD: MCUboot copies this image into SRAM and runs it,
# sharing boot info through retained RAM. Pair with SB_CONFIG_MCUBOOT_MODE_RAM_LOAD.
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETAINED_MEM_ZEPHYR_RAM=y
CONFIG_RETENTION_BOOTLOADER_INFO=y
CONFIG_RETENTION_BOOTLOADER_INFO_TYPE_MCUBOOT=y

# Enter MCUboot serial recovery on demand: the standard `os reset` command
# takes a boot_mode field, written to retained RAM; MCUboot reads it on reboot.
CONFIG_RETENTION_BOOT_MODE=y
CONFIG_MCUMGR_GRP_OS_RESET_BOOT_MODE=y

# Logging + SMP on separate UARTs, like MCUboot: the app's console/log goes to
# uart1 (zephyr,console in the overlay), keeping uart0 a clean SMP channel. So
# uart1 shows the whole lifecycle -- MCUboot's boot log, then the app's.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y
CONFIG_UART_CONSOLE=y
