# MCUboot image of the do-it-all serial-recovery fixture (FILE_SUFFIX="recovery").
#
# RAM_LOAD: MCUboot copies the image from slot0 into SRAM and runs it, so the
# full application boots under MCUboot even though the flash simulator is not
# XIP-mapped on mps2. With no image present yet, BOOT_SERIAL_NO_APPLICATION drops
# into serial recovery so a client can upload one; the upload persists across the
# soft reset (the slots live in a retained memory-region, see the overlay).
CONFIG_FLASH_SIMULATOR=y
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=n
CONFIG_BOOT_SERIAL_NO_APPLICATION=y

# Advertise SMP buffer params (MCUmgr OS group, command 6) from serial recovery so
# a client can auto-negotiate serial fragmentation against the bootloader instead
# of being told a size out of band. The reported buf_size is the decoded ceiling
# BOOT_SERIAL_MAX_RECEIVE_SIZE (default 1024), independent of the app's
# CONFIG_MCUMGR_TRANSPORT_NETBUF_SIZE; buf_count is always 1. Requires the default
# BOOT_MAX_LINE_INPUT_LEN = 128, which every recovery fixture keeps.
CONFIG_BOOT_MGMT_MCUMGR_PARAMS=y

# Recovery SMP owns uart0; MCUboot's console + boot log go to uart1 (see the
# overlay's zephyr,console). This dual-UART split keeps the boot decision
# (RAM load / recovery / errors) observable without colliding with SMP.
CONFIG_LOG=y
CONFIG_LOG_BACKEND_UART=y

# Share boot info with the app, and re-enter recovery on demand: the app's
# `os reset boot_mode=1` sets the retained boot mode that BOOT_SERIAL_BOOT_MODE
# reads on the next boot.
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETAINED_MEM_ZEPHYR_RAM=y
CONFIG_BOOT_SHARE_DATA=y
CONFIG_BOOT_SHARE_DATA_BOOTINFO=y
CONFIG_BOOT_SHARE_BACKEND_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y
CONFIG_BOOT_SERIAL_BOOT_MODE=y

# The app is linked to execute from this SRAM region (the imgtool load address,
# = the app's carved sram0 in mps2_an385_ramload_app.overlay). MCUboot validates
# the image's load address against this window.
CONFIG_BOOT_IMAGE_EXECUTABLE_RAM_START=0x20240000
CONFIG_BOOT_IMAGE_EXECUTABLE_RAM_SIZE=1830912
