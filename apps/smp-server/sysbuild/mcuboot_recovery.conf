# MCUboot image of the serial-recovery fixture (FILE_SUFFIX="recovery").
# Boots its own SMP server (serial recovery) for image upload, and -- with no
# valid application present -- stays there. The flash simulator backs the slots.
CONFIG_FLASH_SIMULATOR=y
CONFIG_MCUBOOT_SERIAL=y
CONFIG_BOOT_SERIAL_ENTRANCE_GPIO=n
CONFIG_BOOT_SERIAL_NO_APPLICATION=y
CONFIG_UART_CONSOLE=n
