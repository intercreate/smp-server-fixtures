# Minimal base shared by all fixtures. Transports, MCUmgr groups, and the
# MCUboot/img (DFU) layer are composed per-fixture in sample.yaml. Keeping
# MCUboot out of the base lets the native_sim fixtures build without conflict.
CONFIG_NET_BUF=y
CONFIG_ZCBOR=y
CONFIG_CRC=y
CONFIG_MCUMGR=y
CONFIG_STATS=y
CONFIG_STATS_NAMES=y
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2304
CONFIG_MAIN_STACK_SIZE=2176
CONFIG_LOG=y
CONFIG_LOG_MAX_LEVEL=3
